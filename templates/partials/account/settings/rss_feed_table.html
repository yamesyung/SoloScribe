<tbody id="feeds-table">
{% for feed in feed_list %}
    <tr>
      <td>{{ feed.display_name|default:"—" }}</td>
      <td>{{ feed.feed_url }}</td>
      <td>{{ feed.update_count }}</td>
      <td>{{ feed.last_fetched_at|timesince }} ago</td>

      <td>
        <input
          type="checkbox"
          {% if feed.is_active %}checked{% endif %}
          hx-post="{% url 'toggle_rss_feed' feed.id %}"
          hx-target="#feeds-table"
          hx-swap="outerHTML">
      </td>

      <td>
        <button
          hx-post="{% url 'delete_rss_feed' feed.id %}"
          hx-target="closest tr"
          hx-swap="outerHTML swap:1s"
          hx-confirm="Remove this feed?">
          Delete
        </button>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No feeds yet.</td></tr>
{% endfor %}

{% if error %}
  <tr><td colspan="4" class="form-message error">{{ error }}</td></tr>
{% endif %}

</tbody>
