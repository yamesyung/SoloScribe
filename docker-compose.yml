version: "3.7"

services:
  web:
    build:
      context: .
      network: host
    command: >
      sh -c "python manage.py migrate &&
             python manage.py load_geodata &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - 8000:8000
    depends_on:
      - db
      - scrapyd
    environment:
      - "DJANGO_SECRET_KEY=django-insecure-934gt^s4@%cme3-j&0q^)26z105+)z%^9*s=(ol%cp-xew%lae"
      - "DJANGO_DEBUG=True"

  scrapyd:
    build:
      context: .
      network: host
    command: bash -c "cd ./scrapers/gr_scrapers && scrapyd --pidfile="
    volumes:
      - .:/code
    ports:
      - "6800:6800"
    tty: true
    stdin_open: true
    dns:
      - 8.8.8.8

  cron:
    build:
      context: .
      network: host
    command: >
      sh -c "echo '0 * * * * cd /code && /usr/local/bin/python manage.py cron_fetch_all_feeds >> /proc/1/fd/1 2>&1' | crontab -
      && cron -f"
    volumes:
      - .:/code
    depends_on:
      - db
    environment:
      - "DJANGO_SECRET_KEY=django-insecure-934gt^s4@%cme3-j&0q^)26z105+)z%^9*s=(ol%cp-xew%lae"
      - "DJANGO_DEBUG=True"

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
    ports:
      - "54320:5432"
volumes:
  postgres_data: